apiVersion: batch/v1
kind: Job
metadata:
  name: mkimotsu-jigsaw-head-only-export
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: "NVIDIA-GeForce-RTX-3090"
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: mkimotsu-jigsaw-qlora-pvc
      containers:
        - name: jigsaw-head-only-export
          image: pytorch/pytorch:2.2.2-cuda12.1-cudnn8-runtime
          resources:
            requests:
              cpu: "8"
              memory: "64Gi"
              nvidia.com/gpu: 1
            limits:
              cpu: "8"
              memory: "64Gi"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mkimotsu-secrets
                  key: hf_token
            - name: PYTHONUNBUFFERED
              value: "1"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euxo pipefail
              cd /workspace

              pip install -U "numpy<2" tensorboard
              pip install -U \
                "transformers==4.44.2" \
                "huggingface_hub==0.25.2" \
                "datasets==2.18.0" \
                "accelerate==0.33.0" \
                "evaluate==0.4.1" \
                "iterative-stratification"

              mkdir -p /workspace/logs

              python llama_jigsaw_toxicity_classification_only_head_train.py \
                --export-only \
                --saved-model-dir /workspace/sequence_classification/saved_model \
                --output-dir /workspace/sequence_classification \
                --export-batch-size 8 2>&1 | tee /workspace/logs/head_only_export_$(date +%Y%m%d_%H%M%S).log
